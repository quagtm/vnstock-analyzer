name: Data Pipeline and Deploy

on:
  push:
    branches:
      - main
      - master
  schedule:
    # Lần 1: 15:15 VN (08:15 UTC) - ngay sau khi sàn đóng cửa (14:45 VN)
    - cron: '15 8 * * 1-5'
    # Lần 2: 16:30 VN (09:30 UTC) - backup, dữ liệu đã fully settled
    - cron: '30 9 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run Data Pipeline
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          cd data_pipeline
          python fetch_and_analyze.py
          
      - name: Copy data.json to frontend/public
        run: |
          mkdir -p frontend/public
          cp data_pipeline/output/data.json frontend/public/data.json
          echo "Copied data.json successfully"
          cat frontend/public/data.json | head -5

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend
          keep_files: false
