name: Data Pipeline and Deploy

on:
  push:
    branches:
      - main
      - master
  schedule:
    # === BÙ DELAY ~5H CỦA GITHUB FREE TIER ===
    # Muốn chạy 15:15 VN (08:15 UTC) → đặt 03:15 UTC
    - cron: '15 3 * * 1-5'
    # Muốn chạy 15:45 VN (08:45 UTC) → đặt 03:45 UTC
    - cron: '45 3 * * 1-5'
    # Muốn chạy 16:30 VN (09:30 UTC) → đặt 04:30 UTC
    - cron: '30 4 * * 1-5'
    # Muốn chạy 17:30 VN (10:30 UTC) → đặt 05:30 UTC
    - cron: '30 5 * * 1-5'
    # Keepalive sáng: 8:30 VN (01:30 UTC) — giữ workflow khỏi bị disable
    - cron: '30 1 * * 1-5'
  workflow_dispatch:
    inputs:
      force_run:
        description: 'Bỏ qua market guard và chạy pipeline ngay (true/false)'
        required: false
        default: 'true'

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt --quiet
          python -c "import warnings; warnings.filterwarnings('ignore'); import logging; logging.disable(logging.CRITICAL); from vnstock import Quote, Listing, Trading; print('[OK] vnstock v4 imports ok')"
          
      - name: Check if market is closed
        id: market_check
        run: |
          EVENT="${{ github.event_name }}"
          FORCE="${{ github.event.inputs.force_run }}"

          # workflow_dispatch với force_run=true → luôn chạy (bypass market guard)
          if [ "$EVENT" = "workflow_dispatch" ] && [ "$FORCE" != "false" ]; then
            echo "Manual trigger (workflow_dispatch) — bypass market guard, running pipeline"
            echo "skip=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          HOUR_UTC=$(date -u +%H)
          MIN_UTC=$(date -u +%M)
          TOTAL_MIN=$((HOUR_UTC * 60 + MIN_UTC))
          # 07:45 UTC = 14:45 VN (market close)
          MARKET_CLOSE_MIN=$((7 * 60 + 45))
          DAY=$(date -u +%u)  # 1=Mon ... 7=Sun

          if [ "$DAY" -ge 6 ]; then
            echo "Weekend — skip"
            echo "skip=true" >> $GITHUB_OUTPUT
          elif [ "$TOTAL_MIN" -lt "$MARKET_CLOSE_MIN" ]; then
            echo "Before market close ($(date -u '+%H:%M') UTC) — skip to wait for EOD data"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "Market closed ($(date -u '+%H:%M') UTC) — running pipeline"
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Run Data Pipeline
        if: steps.market_check.outputs.skip != 'true'
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          cd data_pipeline
          python fetch_and_analyze.py
          
      - name: Copy data.json to frontend/public
        if: steps.market_check.outputs.skip != 'true'
        run: |
          mkdir -p frontend/public
          cp data_pipeline/output/data.json frontend/public/data.json
          echo "Copied data.json successfully"
          python -c "import json; d=json.load(open('frontend/public/data.json')); sym=list(d.keys())[0]; print('[CHECK] Fields:', list(d[sym].keys()))"

      - name: Deploy to GitHub Pages
        if: steps.market_check.outputs.skip != 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend
          keep_files: false
