name: Data Pipeline and Deploy

on:
  push:
    branches:
      - main
      - master
  schedule:
    # Chạy sau giờ đóng cửa (15:00 VN = 08:00 UTC)
    # Lịch GitHub Actions có thể bị delay, nên rải đều các khung giờ
    - cron: '15 8 * * 1-5'  # 15:15 VN
    - cron: '45 8 * * 1-5'  # 15:45 VN
    - cron: '30 9 * * 1-5'  # 16:30 VN
    - cron: '30 10 * * 1-5' # 17:30 VN
    - cron: '30 11 * * 1-5' # 18:30 VN
    - cron: '30 13 * * 1-5' # 20:30 VN
  workflow_dispatch:
    inputs:
      force_run:
        description: 'Bỏ qua market guard và chạy pipeline ngay (true/false)'
        required: false
        default: 'true'

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt --quiet
          python -c "import warnings; warnings.filterwarnings('ignore'); import logging; logging.disable(logging.CRITICAL); from vnstock.explorer.vci import Quote, Listing, Trading; print('[OK] vnstock.explorer.vci imports ok')"
          
      - name: Check if market is closed
        id: market_check
        run: |
          EVENT="${{ github.event_name }}"
          FORCE="${{ github.event.inputs.force_run }}"

          # workflow_dispatch với force_run=true → luôn chạy (bypass market guard)
          if [ "$EVENT" = "workflow_dispatch" ] && [ "$FORCE" != "false" ]; then
            echo "Manual trigger (workflow_dispatch) — bypass market guard, running pipeline"
            echo "skip=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # push event → luôn chạy (cho phép test code changes ngay lập tức)
          if [ "$EVENT" = "push" ]; then
            echo "Push event — bypass market guard, running pipeline"
            echo "skip=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          HOUR_UTC=$(date -u +%H)
          MIN_UTC=$(date -u +%M)
          TOTAL_MIN=$((HOUR_UTC * 60 + MIN_UTC))
          # 07:45 UTC = 14:45 VN (market close)
          MARKET_CLOSE_MIN=$((7 * 60 + 45))
          DAY=$(date -u +%u)  # 1=Mon ... 7=Sun

          if [ "$DAY" -ge 6 ]; then
            echo "Weekend — skip"
            echo "skip=true" >> $GITHUB_OUTPUT
          elif [ "$TOTAL_MIN" -lt "$MARKET_CLOSE_MIN" ]; then
            echo "Before market close ($(date -u '+%H:%M') UTC) — skip to wait for EOD data"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "Market closed ($(date -u '+%H:%M') UTC) — running pipeline"
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Run Data Pipeline
        if: steps.market_check.outputs.skip != 'true'
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          # Đảm bảo custom_sectors.json tồn tại trong data_pipeline/
          if [ -f custom_sectors.json ]; then
            cp custom_sectors.json data_pipeline/custom_sectors.json
            echo "Copied custom_sectors.json to data_pipeline/"
          fi
          cd data_pipeline
          python fetch_and_analyze.py

          
      - name: Copy data.json to frontend/public
        if: steps.market_check.outputs.skip != 'true'
        run: |
          mkdir -p frontend/public
          cp data_pipeline/output/data.json frontend/public/data.json
          echo "Copied data.json successfully"
          python -c "import json; d=json.load(open('frontend/public/data.json')); sym=list(d.keys())[0]; print('[CHECK] Fields:', list(d[sym].keys()))"

      - name: Deploy to GitHub Pages
        if: steps.market_check.outputs.skip != 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend
          keep_files: false
