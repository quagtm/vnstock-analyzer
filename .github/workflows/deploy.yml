name: Data Pipeline and Deploy

on:
  push:
    branches:
      - main
      - master
  schedule:
    # === BÙ DELAY ~5H CỦA GITHUB FREE TIER ===
    # Muốn chạy 15:15 VN (08:15 UTC) → đặt 03:15 UTC
    - cron: '15 3 * * 1-5'
    # Muốn chạy 15:45 VN (08:45 UTC) → đặt 03:45 UTC
    - cron: '45 3 * * 1-5'
    # Muốn chạy 16:30 VN (09:30 UTC) → đặt 04:30 UTC
    - cron: '30 4 * * 1-5'
    # Muốn chạy 17:30 VN (10:30 UTC) → đặt 05:30 UTC
    - cron: '30 5 * * 1-5'
    # Keepalive sáng: 8:30 VN (01:30 UTC) — giữ workflow khỏi bị disable
    - cron: '30 1 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "vnstock>=4.0.0" --quiet
          pip install -r requirements.txt --quiet
          python -c "from vnstock.api.quote import Quote; from vnstock.api.listing import Listing; from vnstock.api.trading import Trading; print('[OK] vnstock 4.x API imports verified')"
          
      - name: Check if market is closed (skip if before 14:45 VN = 07:45 UTC)
        id: market_check
        run: |
          HOUR_UTC=$(date -u +%H)
          MIN_UTC=$(date -u +%M)
          TOTAL_MIN=$((HOUR_UTC * 60 + MIN_UTC))
          # 07:45 UTC = 14:45 VN (market close)
          MARKET_CLOSE_MIN=$((7 * 60 + 45))
          DAY=$(date -u +%u)  # 1=Mon ... 7=Sun
          if [ "$DAY" -ge 6 ]; then
            echo "Weekend — skip"
            echo "skip=true" >> $GITHUB_OUTPUT
          elif [ "$TOTAL_MIN" -lt "$MARKET_CLOSE_MIN" ]; then
            echo "Before market close ($(date -u '+%H:%M') UTC) — skip to wait for EOD data"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "Market closed ($(date -u '+%H:%M') UTC) — running pipeline"
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Run Data Pipeline
        if: steps.market_check.outputs.skip != 'true'
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          cd data_pipeline
          python fetch_and_analyze.py
          
      - name: Copy data.json to frontend/public
        if: steps.market_check.outputs.skip != 'true'
        run: |
          mkdir -p frontend/public
          cp data_pipeline/output/data.json frontend/public/data.json
          echo "Copied data.json successfully"
          cat frontend/public/data.json | head -5

      - name: Deploy to GitHub Pages
        if: steps.market_check.outputs.skip != 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend
          keep_files: false
